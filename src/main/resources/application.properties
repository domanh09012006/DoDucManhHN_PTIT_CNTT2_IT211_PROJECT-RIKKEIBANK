spring.application.name=Rikkebank
server.port=8080

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/rikkei_bank?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# FILE UPLOAD (eKYC)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# JWT
jwt.secret-key=1234567891234567891234567891234567891234567891234567891234567891

# 5 minutes
jwt.access-token-expiration=300000

# 1 day
jwt.refresh-token-expiration=86400000


# CLOUDINARY
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=

# LOGGING
logging.level.org.springframework.security=DEBUG
logging.level.com.rikkeibank=DEBUG
